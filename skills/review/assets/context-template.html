<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>レビュー対象コンテキスト</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; line-height: 1.6; color: #1f2328; }
  h1 { border-bottom: 2px solid #d0d7de; padding-bottom: 0.4rem; }
  h2 { margin-top: 1.8rem; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3rem; }
  h3 { margin-top: 1.2rem; }
  dl { display: grid; grid-template-columns: max-content 1fr; gap: 0.3rem 1rem; }
  dt { font-weight: 600; color: #57606a; }
  code { background: #f6f8fa; padding: 0.1rem 0.35rem; border-radius: 4px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  blockquote { border-left: 4px solid #0969da; background: #f6f8fa; padding: 0.6rem 1rem; margin: 0.8rem 0; color: #57606a; }
</style>
</head>
<body>

<h1>レビュー対象コンテキスト</h1>

<h2>モード</h2>
<p>PR モード（または ローカルモード）</p>

<h2>PR 情報</h2>
<dl>
  <dt>番号</dt><dd>#123</dd>
  <dt>URL</dt><dd><a href="https://...">https://...</a></dd>
  <dt>タイトル</dt><dd>xxx</dd>
  <dt>作成者</dt><dd>xxx</dd>
</dl>
<blockquote>PR 説明本文</blockquote>

<h2>関連 Issue</h2>
<dl>
  <dt>番号</dt><dd>#45</dd>
  <dt>タイトル</dt><dd>xxx</dd>
</dl>
<blockquote>Issue 説明の要点</blockquote>

<h2>ローカル成果物（ローカルモードのみ、存在するもののみ）</h2>

<h3>plan.html の要点</h3>
<p>...</p>

<h3>report.html の要点</h3>
<p>...</p>

<h3>checklist.html</h3>
<p>...（全文または要点）</p>

<h3>pr.md の要点</h3>
<p>...</p>

</body>
</html>
